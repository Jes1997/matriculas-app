<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrículas App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="header">

    <button onclick="toggleForm()">➕ Añadir / Editar</button>
    <button onclick="exportData()">⬇️ Exportar</button>

    <input id="search" placeholder="Buscar matrícula...">

  </div>

  <!-- 🚀 MODO RÁPIDO (siempre visible para uso en garita) -->
  <div class="quick-entry">
    <input id="quickPlate" placeholder="Matrícula rápida (ENTER para guardar)">
  </div>

  <div id="form" class="hidden">

    <h3>Formulario</h3>

    <input id="plate" placeholder="Matrícula">
    <input id="company" placeholder="Empresa">
    <input id="key" placeholder="Llave (opcional)">

    <button class="save" onclick="save()">Guardar</button>
    <button onclick="cancelEdit()">Cancelar</button>

    <input type="file" id="importFile" onchange="importData(event)">
  </div>

  <div id="list"></div>

</div>

<script src="script.js"></script>
</body>
</html>
